<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Acesso Seguro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="cartao">
    <div class="marca">
      <div class="ponto"></div>
      <span>Acesso Seguro</span>
    </div>

    <h1>Criar conta</h1>
    <p class="subtitulo">Cadastre-se para depois fazer login.</p>

    <div id="mensagem" class="mensagem"></div>

    <form id="formCadastro">
      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="voce@email.com" autocomplete="email" required>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="mínimo 6 caracteres" autocomplete="new-password" required>
      </div>

      <button type="submit" class="botao" id="btnCadastrar">Cadastrar</button>
    </form>

    <p class="rodape-link">
      Já tem conta? <a href="index.html">Fazer login</a>
    </p>
  </main>

  <!-- ===================================================================== -->
  <!-- Lógica da tela de CADASTRO                                             -->
  <!-- ===================================================================== -->
  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { traduzirErro } from "./mensagens.js";

    const form     = document.getElementById("formCadastro");
    const btn      = document.getElementById("btnCadastrar");
    const caixaMsg = document.getElementById("mensagem");

    function mostrar(texto, tipo) {
      caixaMsg.textContent = texto;
      caixaMsg.className = "mensagem " + tipo;
    }

    form.addEventListener("submit", async (evento) => {
      evento.preventDefault();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      btn.disabled = true;

      try {
        // Cria o usuário no Firebase. A senha precisa ter no mínimo 6 caracteres.
        await createUserWithEmailAndPassword(auth, email, senha);

        // Ao cadastrar, o Firebase JÁ loga o usuário automaticamente.
        // Como o nosso fluxo é "cadastra DEPOIS loga", nós deslogamos aqui
        // e mandamos a pessoa para a tela de login.
        //   (Se quiser entrar direto no painel, basta trocar as 3 linhas
        //    abaixo por:  window.location.href = "painel.html";)
        await signOut(auth);
        mostrar("Conta criada com sucesso! Redirecionando para o login...", "sucesso");
        setTimeout(() => { window.location.href = "index.html"; }, 1500);
      } catch (erro) {
        mostrar(traduzirErro(erro.code), "erro");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
